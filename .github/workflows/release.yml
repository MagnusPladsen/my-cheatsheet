name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libatk1.0-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install dependencies
        run: bun install

      - uses: tauri-apps/tauri-action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: "cheatsheet v__VERSION__"
          releaseDraft: true
          prerelease: false
          projectPath: apps/desktop
          tauriScript: bunx tauri
          args: ${{ matrix.args }}

  updater:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download updater artifacts from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          REPO="${{ github.repository }}"

          mkdir -p artifacts
          # Download .app.tar.gz files (macOS updater bundles) and AppImage (Linux updater bundle)
          gh release download "$TAG" --repo "$REPO" --dir artifacts \
            --pattern "*.app.tar.gz" --pattern "*.AppImage" || true

          echo "=== Downloaded artifacts ==="
          ls -la artifacts/

      - name: Sign artifacts
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          # Sign each artifact using tauri CLI
          for file in artifacts/*; do
            [ -f "$file" ] || continue
            echo "Signing $file..."
            npx @tauri-apps/cli@latest signer sign \
              --private-key "$TAURI_SIGNING_PRIVATE_KEY" \
              --password "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" \
              "$file"

            if [ -f "${file}.sig" ]; then
              echo "Signature created: ${file}.sig"
              cat "${file}.sig"
              echo ""
            else
              echo "WARNING: Failed to create signature for $file"
            fi
          done

          echo "=== All files after signing ==="
          ls -la artifacts/

      - name: Generate and upload latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          REPO="${{ github.repository }}"
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # Map artifacts to platform entries
          DARWIN_AARCH64_URL=""
          DARWIN_AARCH64_SIG=""
          DARWIN_X86_64_URL=""
          DARWIN_X86_64_SIG=""
          LINUX_URL=""
          LINUX_SIG=""

          for file in artifacts/*; do
            [ -f "$file" ] || continue
            basename=$(basename "$file")

            case "$basename" in
              *aarch64*.app.tar.gz.sig)
                DARWIN_AARCH64_SIG=$(cat "$file")
                ;;
              *aarch64*.app.tar.gz)
                DARWIN_AARCH64_URL="https://github.com/$REPO/releases/download/$TAG/$basename"
                ;;
              *x64*.app.tar.gz.sig|*x86_64*.app.tar.gz.sig)
                DARWIN_X86_64_SIG=$(cat "$file")
                ;;
              *x64*.app.tar.gz|*x86_64*.app.tar.gz)
                DARWIN_X86_64_URL="https://github.com/$REPO/releases/download/$TAG/$basename"
                ;;
              *.AppImage.sig)
                LINUX_SIG=$(cat "$file")
                ;;
              *.AppImage)
                LINUX_URL="https://github.com/$REPO/releases/download/$TAG/$basename"
                ;;
            esac
          done

          echo "darwin-aarch64: URL=$DARWIN_AARCH64_URL SIG=${DARWIN_AARCH64_SIG:0:20}..."
          echo "darwin-x86_64: URL=$DARWIN_X86_64_URL SIG=${DARWIN_X86_64_SIG:0:20}..."
          echo "linux-x86_64: URL=$LINUX_URL SIG=${LINUX_SIG:0:20}..."

          # Build latest.json
          jq -n \
            --arg version "$TAG" \
            --arg notes "cheatsheet $TAG" \
            --arg pub_date "$DATE" \
            --arg darwin_aarch64_sig "$DARWIN_AARCH64_SIG" \
            --arg darwin_aarch64_url "$DARWIN_AARCH64_URL" \
            --arg darwin_x86_64_sig "$DARWIN_X86_64_SIG" \
            --arg darwin_x86_64_url "$DARWIN_X86_64_URL" \
            --arg linux_sig "$LINUX_SIG" \
            --arg linux_url "$LINUX_URL" \
            '{
              version: $version,
              notes: $notes,
              pub_date: $pub_date,
              platforms: (
                {}
                | if ($darwin_aarch64_sig | length > 0) and ($darwin_aarch64_url | length > 0)
                  then . + {"darwin-aarch64": {signature: $darwin_aarch64_sig, url: $darwin_aarch64_url}}
                  else . end
                | if ($darwin_x86_64_sig | length > 0) and ($darwin_x86_64_url | length > 0)
                  then . + {"darwin-x86_64": {signature: $darwin_x86_64_sig, url: $darwin_x86_64_url}}
                  else . end
                | if ($linux_sig | length > 0) and ($linux_url | length > 0)
                  then . + {"linux-x86_64": {signature: $linux_sig, url: $linux_url}}
                  else . end
              )
            }' > latest.json

          echo "=== Generated latest.json ==="
          cat latest.json

          # Validate
          PLATFORM_COUNT=$(jq '.platforms | length' latest.json)
          if [ "$PLATFORM_COUNT" -eq 0 ]; then
            echo "ERROR: No platforms in latest.json"
            exit 1
          fi
          echo "Platforms: $PLATFORM_COUNT"

          # Upload to release
          gh release upload "$TAG" latest.json --repo "$REPO" --clobber
          echo "Successfully uploaded latest.json to release $TAG"
