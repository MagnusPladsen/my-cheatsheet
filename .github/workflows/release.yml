name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            target: aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ""
            target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libatk1.0-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install dependencies
        run: bun install

      - uses: tauri-apps/tauri-action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: "cheatsheet v__VERSION__"
          releaseDraft: true
          prerelease: false
          projectPath: apps/desktop
          tauriScript: bunx tauri
          args: ${{ matrix.args }}

      - name: Collect updater artifacts
        run: |
          mkdir -p /tmp/updater-artifacts

          # Find .sig files generated by the build
          echo "=== All .sig files ==="
          find apps/desktop/src-tauri/target -name "*.sig" -type f 2>/dev/null || true

          if [ "${{ matrix.platform }}" = "macos-latest" ]; then
            # macOS: find .app.tar.gz.sig
            SIG=$(find apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle -name "*.app.tar.gz.sig" -type f 2>/dev/null | head -1)
            if [ -z "$SIG" ]; then
              SIG=$(find apps/desktop/src-tauri/target -name "*.app.tar.gz.sig" -type f 2>/dev/null | head -1)
            fi
            if [ -n "$SIG" ]; then
              echo "Found macOS signature: $SIG"
              cp "$SIG" "/tmp/updater-artifacts/${{ matrix.target }}.sig"
            else
              echo "WARNING: No macOS .sig file found"
            fi
          else
            # Linux: find .AppImage.sig
            SIG=$(find apps/desktop/src-tauri/target/release/bundle -name "*.AppImage.sig" -type f 2>/dev/null | head -1)
            if [ -z "$SIG" ]; then
              SIG=$(find apps/desktop/src-tauri/target -name "*.AppImage.sig" -type f 2>/dev/null | head -1)
            fi
            if [ -n "$SIG" ]; then
              echo "Found Linux signature: $SIG"
              cp "$SIG" "/tmp/updater-artifacts/${{ matrix.target }}.sig"
            else
              echo "WARNING: No Linux .sig file found"
            fi
          fi

          echo "=== Collected artifacts ==="
          ls -la /tmp/updater-artifacts/

      - name: Upload signature artifact
        uses: actions/upload-artifact@v4
        with:
          name: sig-${{ matrix.target }}
          path: /tmp/updater-artifacts/
          retention-days: 1

  updater:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all signature artifacts
        uses: actions/download-artifact@v4
        with:
          path: sigs
          pattern: sig-*
          merge-multiple: true

      - name: List signatures
        run: |
          echo "=== Downloaded signatures ==="
          ls -la sigs/ 2>/dev/null || echo "No signatures directory"
          for f in sigs/*.sig; do
            [ -f "$f" ] || continue
            echo "--- $f ---"
            cat "$f"
            echo ""
          done

      - name: Generate and upload latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          REPO="${{ github.repository }}"
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # Get release assets to find exact filenames
          echo "=== Release assets ==="
          gh release view "$TAG" --repo "$REPO" --json assets -q '.assets[].name' || true

          ASSETS=$(gh release view "$TAG" --repo "$REPO" --json assets -q '.assets[].name')

          # Find updater asset URLs
          DARWIN_AARCH64_URL=""
          DARWIN_X86_64_URL=""
          LINUX_URL=""

          while IFS= read -r asset; do
            case "$asset" in
              *aarch64*.app.tar.gz) DARWIN_AARCH64_URL="https://github.com/$REPO/releases/download/$TAG/$asset" ;;
              *.app.tar.gz)
                # If no arch in name, check if we already have aarch64
                if [ -z "$DARWIN_X86_64_URL" ] && echo "$asset" | grep -qiE "x64|x86_64"; then
                  DARWIN_X86_64_URL="https://github.com/$REPO/releases/download/$TAG/$asset"
                elif [ -z "$DARWIN_AARCH64_URL" ]; then
                  DARWIN_AARCH64_URL="https://github.com/$REPO/releases/download/$TAG/$asset"
                elif [ -z "$DARWIN_X86_64_URL" ]; then
                  DARWIN_X86_64_URL="https://github.com/$REPO/releases/download/$TAG/$asset"
                fi
                ;;
              *.AppImage) LINUX_URL="https://github.com/$REPO/releases/download/$TAG/$asset" ;;
            esac
          done <<< "$ASSETS"

          echo "darwin-aarch64 URL: $DARWIN_AARCH64_URL"
          echo "darwin-x86_64 URL: $DARWIN_X86_64_URL"
          echo "linux-x86_64 URL: $LINUX_URL"

          # Read signatures
          DARWIN_AARCH64_SIG=""
          DARWIN_X86_64_SIG=""
          LINUX_SIG=""

          [ -f "sigs/aarch64-apple-darwin.sig" ] && DARWIN_AARCH64_SIG=$(cat sigs/aarch64-apple-darwin.sig)
          [ -f "sigs/x86_64-apple-darwin.sig" ] && DARWIN_X86_64_SIG=$(cat sigs/x86_64-apple-darwin.sig)
          [ -f "sigs/x86_64-unknown-linux-gnu.sig" ] && LINUX_SIG=$(cat sigs/x86_64-unknown-linux-gnu.sig)

          echo "darwin-aarch64 sig: ${DARWIN_AARCH64_SIG:0:20}..."
          echo "darwin-x86_64 sig: ${DARWIN_X86_64_SIG:0:20}..."
          echo "linux-x86_64 sig: ${LINUX_SIG:0:20}..."

          # Build latest.json with jq
          jq -n \
            --arg version "$TAG" \
            --arg notes "cheatsheet $TAG" \
            --arg pub_date "$DATE" \
            --arg darwin_aarch64_sig "$DARWIN_AARCH64_SIG" \
            --arg darwin_aarch64_url "$DARWIN_AARCH64_URL" \
            --arg darwin_x86_64_sig "$DARWIN_X86_64_SIG" \
            --arg darwin_x86_64_url "$DARWIN_X86_64_URL" \
            --arg linux_sig "$LINUX_SIG" \
            --arg linux_url "$LINUX_URL" \
            '{
              version: $version,
              notes: $notes,
              pub_date: $pub_date,
              platforms: (
                {}
                | if ($darwin_aarch64_sig | length > 0) and ($darwin_aarch64_url | length > 0)
                  then . + {"darwin-aarch64": {signature: $darwin_aarch64_sig, url: $darwin_aarch64_url}}
                  else . end
                | if ($darwin_x86_64_sig | length > 0) and ($darwin_x86_64_url | length > 0)
                  then . + {"darwin-x86_64": {signature: $darwin_x86_64_sig, url: $darwin_x86_64_url}}
                  else . end
                | if ($linux_sig | length > 0) and ($linux_url | length > 0)
                  then . + {"linux-x86_64": {signature: $linux_sig, url: $linux_url}}
                  else . end
              )
            }' > latest.json

          echo "=== Generated latest.json ==="
          cat latest.json

          # Validate - must have at least one platform
          PLATFORM_COUNT=$(jq '.platforms | length' latest.json)
          if [ "$PLATFORM_COUNT" -eq 0 ]; then
            echo "ERROR: No platforms in latest.json - signatures or URLs missing"
            exit 1
          fi

          echo "Platforms in latest.json: $PLATFORM_COUNT"

          # Upload to release
          gh release upload "$TAG" latest.json --repo "$REPO" --clobber
          echo "Successfully uploaded latest.json to release $TAG"
