name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libatk1.0-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install dependencies
        run: bun install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: "cheatsheet v__VERSION__"
          releaseDraft: true
          prerelease: false
          projectPath: apps/desktop
          tauriScript: bunx tauri
          args: ${{ matrix.args }}

  update-homebrew:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download macOS DMGs from draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p artifacts
          VERSION="${{ steps.version.outputs.version }}"

          # Find the draft release (tauri-action creates drafts)
          for i in $(seq 1 30); do
            RELEASE=$(gh api repos/${{ github.repository }}/releases \
              --jq ".[] | select(.tag_name == \"${{ github.ref_name }}\")" 2>/dev/null || echo "")
            if [ -n "$RELEASE" ]; then
              DMG_COUNT=$(echo "$RELEASE" | jq '[.assets[] | select(.name | endswith(".dmg"))] | length')
              if [ "$DMG_COUNT" -ge 2 ]; then
                echo "Found release with $DMG_COUNT DMG assets"
                break
              fi
            fi
            echo "Waiting for release assets... (attempt $i)"
            sleep 10
          done

          # Download DMGs via API
          echo "$RELEASE" | jq -r '.assets[] | select(.name | endswith(".dmg")) | .url' | while read url; do
            FILENAME=$(echo "$RELEASE" | jq -r ".assets[] | select(.url == \"$url\") | .name")
            echo "Downloading $FILENAME..."
            curl -sL -H "Authorization: token $GH_TOKEN" \
              -H "Accept: application/octet-stream" \
              "$url" -o "artifacts/$FILENAME"
          done
          ls -la artifacts/

      - name: Compute SHA256 checksums
        id: sha
        run: |
          cd artifacts
          for f in *.dmg; do
            echo "File: $f"
            sha256sum "$f"
          done
          ARM64_SHA=$(sha256sum *aarch64*.dmg | awk '{print $1}')
          X64_SHA=$(sha256sum *x64*.dmg 2>/dev/null | awk '{print $1}')
          if [ -z "$X64_SHA" ]; then
            X64_SHA=$(sha256sum *x86_64*.dmg | awk '{print $1}')
          fi
          echo "arm64=$ARM64_SHA" >> "$GITHUB_OUTPUT"
          echo "x64=$X64_SHA" >> "$GITHUB_OUTPUT"

      - name: Update Homebrew cask
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ARM64_SHA="${{ steps.sha.outputs.arm64 }}"
          X64_SHA="${{ steps.sha.outputs.x64 }}"

          # Fetch current cask formula
          CURRENT=$(curl -s -H "Authorization: token $HOMEBREW_TAP_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/MagnusPladsen/homebrew-cheatsheet/contents/Casks/cheatsheet-app.rb")

          FILE_SHA=$(echo "$CURRENT" | jq -r '.sha')

          # Generate updated formula
          FORMULA=$(cat <<'RUBY'
          cask "cheatsheet-app" do
            arch arm: "aarch64", intel: "x64"

            version "VERSION_PLACEHOLDER"
            sha256 arm:   "ARM64_SHA_PLACEHOLDER",
                   intel: "X64_SHA_PLACEHOLDER"

            url "https://github.com/MagnusPladsen/my-cheatsheet/releases/download/v#{version}/cheatsheet_#{version}_#{arch}.dmg"
            name "Cheatsheet"
            desc "Developer keybinding cheatsheet for neovim, tmux, aerospace, and more"
            homepage "https://github.com/MagnusPladsen/my-cheatsheet"

            app "cheatsheet.app"

            zap trash: [
              "~/Library/Application Support/com.magnuspladsen.cheatsheet",
            ]
          end
          RUBY
          )

          FORMULA="${FORMULA//VERSION_PLACEHOLDER/$VERSION}"
          FORMULA="${FORMULA//ARM64_SHA_PLACEHOLDER/$ARM64_SHA}"
          FORMULA="${FORMULA//X64_SHA_PLACEHOLDER/$X64_SHA}"

          # Base64 encode
          CONTENT=$(echo "$FORMULA" | base64 -w 0)

          # Update file via GitHub API
          curl -s -X PUT \
            -H "Authorization: token $HOMEBREW_TAP_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/MagnusPladsen/homebrew-cheatsheet/contents/Casks/cheatsheet.rb" \
            -d "{\"message\":\"Update cheatsheet to v${VERSION}\",\"content\":\"${CONTENT}\",\"sha\":\"${FILE_SHA}\"}"

  update-aur:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Wait for release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for i in $(seq 1 30); do
            RELEASE=$(gh api repos/${{ github.repository }}/releases \
              --jq ".[] | select(.tag_name == \"${{ github.ref_name }}\")" 2>/dev/null || echo "")
            if [ -n "$RELEASE" ]; then
              DEB_COUNT=$(echo "$RELEASE" | jq '[.assets[] | select(.name | endswith(".deb"))] | length')
              if [ "$DEB_COUNT" -ge 1 ]; then
                echo "Found release with .deb asset"
                break
              fi
            fi
            echo "Waiting for release assets... (attempt $i)"
            sleep 10
          done

      - name: Download .deb package
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p artifacts
          RELEASE=$(gh api repos/${{ github.repository }}/releases \
            --jq ".[] | select(.tag_name == \"${{ github.ref_name }}\")")
          echo "$RELEASE" | jq -r '.assets[] | select(.name | endswith(".deb")) | .url' | while read url; do
            FILENAME=$(echo "$RELEASE" | jq -r ".assets[] | select(.url == \"$url\") | .name")
            echo "Downloading $FILENAME..."
            curl -sL -H "Authorization: token $GH_TOKEN" \
              -H "Accept: application/octet-stream" \
              "$url" -o "artifacts/$FILENAME"
          done

      - name: Compute SHA256 checksum
        id: sha
        run: |
          DEB_SHA=$(sha256sum artifacts/*.deb | awk '{print $1}')
          echo "deb=$DEB_SHA" >> "$GITHUB_OUTPUT"

      - name: Setup SSH for AUR
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$AUR_SSH_PRIVATE_KEY" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          ssh-keyscan aur.archlinux.org >> ~/.ssh/known_hosts
          cat >> ~/.ssh/config <<'EOF'
          Host aur.archlinux.org
            IdentityFile ~/.ssh/aur
            User aur
          EOF

      - name: Clone AUR repo and update
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          DEB_SHA="${{ steps.sha.outputs.deb }}"

          git clone ssh://aur@aur.archlinux.org/cheatsheet-app-bin.git aur-repo

          # Copy PKGBUILD template from repo and update version + sha
          cp cheatsheet-app-bin/PKGBUILD aur-repo/PKGBUILD
          cd aur-repo
          sed -i "s/^pkgver=.*/pkgver=${VERSION}/" PKGBUILD
          sed -i "s/^sha256sums_x86_64=.*/sha256sums_x86_64=('${DEB_SHA}')/" PKGBUILD

          # Generate .SRCINFO from PKGBUILD
          python3 -c "
          import re

          with open('PKGBUILD') as f:
              content = f.read()

          def get(key):
              m = re.search(rf\"^{key}=(.*)$\", content, re.M)
              return m.group(1).strip().strip(\"'\\\"\") if m else ''

          def get_list(key):
              m = re.search(rf\"^{key}=\((.*?)\)\", content, re.M | re.S)
              if not m: return []
              return [x.strip().strip(\"'\\\"\") for x in m.group(1).split() if x.strip().strip(\"'\\\"\")]

          pkgname = get('pkgname')
          pkgver = get('pkgver')
          pkgrel = get('pkgrel')
          pkgdesc = get('pkgdesc')
          url = get('url')
          arch = get_list('arch')
          license_ = get_list('license')
          depends = get_list('depends')
          options = get_list('options')

          source_url = url + f'/releases/download/v{pkgver}/cheatsheet_{pkgver}_amd64.deb'
          sha = get_list('sha256sums_x86_64')

          lines = [f'pkgbase = {pkgname}']
          lines.append(f'\tpkgdesc = {pkgdesc}')
          lines.append(f'\tpkgver = {pkgver}')
          lines.append(f'\tpkgrel = {pkgrel}')
          lines.append(f'\turl = {url}')
          for a in arch: lines.append(f'\tarch = {a}')
          for l in license_: lines.append(f'\tlicense = {l}')
          for d in depends: lines.append(f'\tdepends = {d}')
          for o in options: lines.append(f'\toptions = {o}')
          lines.append(f'\tsource_x86_64 = {source_url}')
          if sha: lines.append(f'\tsha256sums_x86_64 = {sha[0]}')
          lines.append('')
          lines.append(f'pkgname = {pkgname}')

          with open('.SRCINFO', 'w') as f:
              f.write('\n'.join(lines) + '\n')
          "

          # Commit and push
          git config user.email "magnuspladsen@users.noreply.github.com"
          git config user.name "Magnus Pladsen"
          git add PKGBUILD .SRCINFO
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "Update to v${VERSION}"
          git push
